<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sulaeman - Personal Page</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            padding: 40px;
            border: 2px solid #333;
            border-radius: 20px;
            background: #1e1e1e;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            color: #00d4ff;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .line {
            width: 50px;
            height: 4px;
            background: #00d4ff;
            margin: 10px auto 20px;
            border-radius: 2px;
        }

        p {
            font-size: 1.1rem;
            color: #bbb;
            line-height: 1.6;
        }

        .social-links {
            margin-top: 25px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            color: #00d4ff;
            border: 1px solid #00d4ff;
            text-decoration: none;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #00d4ff;
            color: #121212;
            box-shadow: 0 0 15px #00d4ff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>SULAEMAN</h1>
        <div class="line"></div>
        <p>Selamat datang di halaman resmi saya. Saya senang bereksplorasi dengan teknologi dan hal-hal baru.</p>
        
        <div class="social-links">
            <a href="#" class="btn">Hubungi Saya</a>
        </div>
    </div>

</body>
</html>
